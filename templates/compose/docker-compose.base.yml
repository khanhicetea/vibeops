# Reference base topology (generated from state at render time)
name: bento
networks:
  private:
    driver: bridge
    name: bento_private
services:
  nginx:
    image: bento/nginx:latest
    network_mode: host
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [private]
    volumes:
      - redis-data:/data
volumes:
  redis-data: null
