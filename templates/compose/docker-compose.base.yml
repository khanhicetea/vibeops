# Reference base topology (generated from state at render time)
x-log-common: &log-common
  driver: local
  options:
    max-size: 10m
    max-file: "3"
name: bento
networks:
  private:
    driver: bridge
    name: bento_private
services:
  nginx:
    image: bento/nginx:latest
    network_mode: host
    restart: unless-stopped
    logging: *log-common
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *log-common
    networks: [private]
    volumes:
      - redis-data:/data
volumes:
  redis-data: null
