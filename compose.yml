name: vibeops

x-php-common: &php-common
  build:
    context: ./php
  entrypoint: ["docker-php-entrypoint"]
  environment:
    TZ: ${TZ:-Asia/Ho_Chi_Minh}
    SOCKET_GROUP_NAME: ${SOCKET_GROUP_NAME:-nginxsock}
    SOCKET_GID: ${SOCKET_GID:-101}
    FIX_HOME_OWNERSHIP: ${FIX_HOME_OWNERSHIP:-1}
  depends_on:
    - mysql
    - redis
  networks:
    - backend

x-php84-image: &php84-image vibeops-php84:${PHP84_VERSION:-8.4}
x-php85-image: &php85-image vibeops-php85:${PHP85_VERSION:-8.5}

x-php84-build: &php84-build
  context: ./php
  args:
    PHP_VERSION: ${PHP84_VERSION:-8.4}
    TZ: ${TZ:-Asia/Ho_Chi_Minh}

x-php85-build: &php85-build
  context: ./php
  args:
    PHP_VERSION: ${PHP85_VERSION:-8.5}
    TZ: ${TZ:-Asia/Ho_Chi_Minh}

x-php84-volumes: &php84-volumes
  - ./home:/home
  - ./run/php-fpm/php84:/run/php-fpm
  - ./logs/php/php84:/var/log/php
  - ./php/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
  - ./php/8.4/pool.d:/usr/local/etc/php-fpm.d/pools:ro
  - ./php/8.4/users.d:/usr/local/etc/php/users.d:ro
  - ./php/8.4/cron.d:/usr/local/etc/php/cron.d:ro
  - ./php/php-user-sync:/usr/local/bin/php-user-sync:ro
  - ./php/php-cron-as:/usr/local/bin/php-cron-as:ro
  - ./php/php-supercronic:/usr/local/bin/php-supercronic:ro

x-php85-volumes: &php85-volumes
  - ./home:/home
  - ./run/php-fpm/php85:/run/php-fpm
  - ./logs/php/php85:/var/log/php
  - ./php/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
  - ./php/8.5/pool.d:/usr/local/etc/php-fpm.d/pools:ro
  - ./php/8.5/users.d:/usr/local/etc/php/users.d:ro
  - ./php/8.5/cron.d:/usr/local/etc/php/cron.d:ro
  - ./php/php-user-sync:/usr/local/bin/php-user-sync:ro
  - ./php/php-cron-as:/usr/local/bin/php-cron-as:ro
  - ./php/php-supercronic:/usr/local/bin/php-supercronic:ro

services:
  nginx:
    image: nginx:1.30-trixie
    restart: unless-stopped
    # Host network: nginx binds directly to host :80 and :443 TCP/UDP with no Docker port mapping/NAT.
    # Intended for Linux cloud servers. Docker Desktop host networking behaves differently.
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/self-signed:/etc/nginx/self-signed:ro
      - ./home:/home:ro
      - ./run/php-fpm:/run/php-fpm
      - ./nginx/acme-state:/var/cache/nginx/acme-letsencrypt
      - ./acme-challenge:/usr/share/nginx/acme-challenge:ro
      - ./certs:/etc/letsencrypt:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php84
      - php85

  # PHP-FPM services: web runtime only. They expose per-user Unix sockets.
  php84:
    <<: *php-common
    image: *php84-image
    restart: unless-stopped
    build: *php84-build
    command: ["sh", "-lc", "php-user-sync && exec php-fpm -F"]
    volumes: *php84-volumes

  php85:
    <<: *php-common
    image: *php85-image
    restart: unless-stopped
    build: *php85-build
    command: ["sh", "-lc", "php-user-sync && exec php-fpm -F"]
    volumes: *php85-volumes

  # Cron services: scheduler only. manage.py reloads Supercronic with SIGUSR2 after cron changes.
  php84-cron:
    <<: *php-common
    image: *php84-image
    restart: unless-stopped
    build: *php84-build
    command: ["sh", "-lc", "php-user-sync && exec php-supercronic"]
    volumes: *php84-volumes

  php85-cron:
    <<: *php-common
    image: *php85-image
    restart: unless-stopped
    build: *php85-build
    command: ["sh", "-lc", "php-user-sync && exec php-supercronic"]
    volumes: *php85-volumes

  # Ephemeral CLI/shell services for deploy work. Use docker compose run --rm php85-cli ...
  php84-cli:
    <<: *php-common
    image: *php84-image
    profiles: ["cli"]
    build: *php84-build
    entrypoint: ["sh", "-lc", "php-user-sync && exec \"$@\"", "--"]
    command: ["bash"]
    volumes: *php84-volumes

  php85-cli:
    <<: *php-common
    image: *php85-image
    profiles: ["cli"]
    build: *php85-build
    entrypoint: ["sh", "-lc", "php-user-sync && exec \"$@\"", "--"]
    command: ["bash"]
    volumes: *php85-volumes

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: ["--defaults-extra-file=/etc/mysql/conf.d/z-custom.cnf"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d/z-custom.cnf:/etc/mysql/conf.d/z-custom.cnf:ro
      - ./backups/mysql:/backups
    networks:
      - backend

  redis:
    build:
      context: ./redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - backend

  # Optional toolbox matching your old nodejs_install role.
  node:
    image: node:20-trixie-slim
    profiles: ["node"]
    working_dir: /home
    command: ["sh", "-lc", "sleep infinity"]
    volumes:
      - ./home:/home
    networks:
      - backend

networks:
  backend:

volumes:
  mysql-data:
  redis-data:
