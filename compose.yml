name: vibeops

# Docker owns operational stdout/stderr retention. App-owned cron file logs are
# separate and rotated by the scheduler's daily logrotate job.
x-default-logging: &default-logging
  driver: local
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

x-php-common: &php-common
  build:
    context: ./docker/php
  entrypoint: ["docker-php-entrypoint"]
  environment:
    TZ: ${TZ:-Asia/Ho_Chi_Minh}
    SOCKET_GROUP_NAME: ${SOCKET_GROUP_NAME:-nginxsock}
    SOCKET_GID: ${SOCKET_GID:-101}
    PHP_SUPERCRONIC_METRICS_ADDRESS: 0.0.0.0:9746
  depends_on:
    mysql84:
      condition: service_healthy
    redis:
      condition: service_started
  networks:
    - backend

x-php84-image: &php84-image vibeops-php84:${PHP84_VERSION:-8.4}
x-php85-image: &php85-image vibeops-php85:${PHP85_VERSION:-8.5}

x-php84-build: &php84-build
  context: ./docker/php
  args:
    PHP_VERSION: ${PHP84_VERSION:-8.4}
    TZ: ${TZ:-Asia/Ho_Chi_Minh}

x-php85-build: &php85-build
  context: ./docker/php
  args:
    PHP_VERSION: ${PHP85_VERSION:-8.5}
    TZ: ${TZ:-Asia/Ho_Chi_Minh}

x-php84-volumes: &php84-volumes
  - ./runtime/home:/home
  - ./runtime/run/php-fpm/php84:/run/php-fpm
  - ./runtime/logs/php/php84:/var/log/php
  - ./config/php/common/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
  - ./runtime/generated/php/versions/8.4/pool.d:/usr/local/etc/php-fpm.d/pools:ro
  - ./runtime/generated/php/versions/8.4/users.d:/usr/local/etc/php/users.d:ro
  - ./runtime/generated/cron/php84:/usr/local/etc/php/cron.d:ro
  - ./docker/php/bin/php-identity-sync:/usr/local/bin/php-identity-sync:ro
  - ./docker/php/bin/php-permissions:/usr/local/bin/php-permissions:ro
  - ./docker/php/bin/php-app-run:/usr/local/bin/php-app-run:ro
  - ./docker/php/bin/php-cron-as:/usr/local/bin/php-cron-as:ro
  - ./docker/php/bin/php-supercronic:/usr/local/bin/php-supercronic:ro

x-php85-volumes: &php85-volumes
  - ./runtime/home:/home
  - ./runtime/run/php-fpm/php85:/run/php-fpm
  - ./runtime/logs/php/php85:/var/log/php
  - ./config/php/common/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
  - ./runtime/generated/php/versions/8.5/pool.d:/usr/local/etc/php-fpm.d/pools:ro
  - ./runtime/generated/php/versions/8.5/users.d:/usr/local/etc/php/users.d:ro
  - ./runtime/generated/cron/php85:/usr/local/etc/php/cron.d:ro
  - ./docker/php/bin/php-identity-sync:/usr/local/bin/php-identity-sync:ro
  - ./docker/php/bin/php-permissions:/usr/local/bin/php-permissions:ro
  - ./docker/php/bin/php-app-run:/usr/local/bin/php-app-run:ro
  - ./docker/php/bin/php-cron-as:/usr/local/bin/php-cron-as:ro
  - ./docker/php/bin/php-supercronic:/usr/local/bin/php-supercronic:ro

x-mysql-healthcheck: &mysql-healthcheck
  test: ["CMD", "mysqladmin", "--defaults-extra-file=/run/secrets/vibeops-root.cnf", "ping", "--silent"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 30s

services:
  nginx:
    image: vibeops-nginx:${NGINX_VERSION:-1.30}
    build:
      context: ./docker/nginx
      args:
        NGINX_IMAGE: nginx:${NGINX_VERSION:-1.30}-trixie
    restart: unless-stopped
    # Host network: nginx binds directly to host :80 and :443 TCP/UDP with no Docker port mapping/NAT.
    # Intended for Linux cloud servers. Docker Desktop host networking behaves differently.
    network_mode: host
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/global:/etc/nginx/global:ro
      - ./runtime/generated/nginx/vhosts:/etc/nginx/vhosts:ro
      - ./config/nginx/snippets:/etc/nginx/snippets:ro
      - ./config/nginx/self-signed:/etc/nginx/self-signed:ro
      - ./runtime/home:/home:ro
      - ./runtime/run/php-fpm:/run/php-fpm
      - ./runtime/nginx-acme-state:/var/cache/nginx/acme-letsencrypt
      - ./runtime/acme-challenge:/usr/share/nginx/acme-challenge:ro
      - ./runtime/certs:/etc/letsencrypt:ro
      - ./runtime/logs/nginx:/var/log/nginx
    depends_on:
      - php84
      - php85
    logging: *default-logging

  # PHP-FPM services: web runtime only. They expose per-user Unix sockets.
  php84:
    <<: *php-common
    image: *php84-image
    restart: unless-stopped
    build: *php84-build
    command: ["sh", "-lc", "php-identity-sync && exec php-fpm -F"]
    volumes: *php84-volumes
    logging: *default-logging

  php85:
    <<: *php-common
    image: *php85-image
    restart: unless-stopped
    build: *php85-build
    command: ["sh", "-lc", "php-identity-sync && exec php-fpm -F"]
    volumes: *php85-volumes
    logging: *default-logging

  # Cron services: scheduler only. manage.py reloads Supercronic with SIGUSR2 after cron changes.
  php84-cron:
    <<: *php-common
    image: *php84-image
    restart: unless-stopped
    build: *php84-build
    command: ["sh", "-lc", "php-identity-sync && exec php-supercronic"]
    volumes: *php84-volumes
    expose: ["9746"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9746/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  php85-cron:
    <<: *php-common
    image: *php85-image
    restart: unless-stopped
    build: *php85-build
    command: ["sh", "-lc", "php-identity-sync && exec php-supercronic"]
    volumes: *php85-volumes
    expose: ["9746"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9746/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  # Ephemeral CLI/shell services for deploy work. Use docker compose run --rm php85-cli ...
  php84-cli:
    <<: *php-common
    image: *php84-image
    profiles: ["cli"]
    build: *php84-build
    entrypoint: ["php-app-run"]
    command: ["bash"]
    volumes: *php84-volumes
    logging: *default-logging

  php85-cli:
    <<: *php-common
    image: *php85-image
    profiles: ["cli"]
    build: *php85-build
    entrypoint: ["php-app-run"]
    command: ["bash"]
    volumes: *php85-volumes
    logging: *default-logging

  # MySQL services are versioned so one server can run legacy, LTS, and preview databases side-by-side.
  # Start one or more explicitly, for example:
  #   docker compose up -d mysql84
  #   docker compose up -d mysql57 mysql84 mysql97
  # Optional legacy MySQL. Start explicitly with: docker compose --profile mysql57 up -d mysql57
  # Buffer pool size must be a multiple of 128M (innodb_buffer_pool_chunk_size default class).
  mysql57:
    image: mysql:${MYSQL57_VERSION:-5.7}
    profiles: ["mysql57"]
    restart: unless-stopped
    logging: *default-logging
    command:
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-384M}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL57_ROOT_PASSWORD:-${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql57-data:/var/lib/mysql
      - ./config/mysql/common/conf.d/10-common.cnf:/etc/mysql/conf.d/10-common.cnf:ro
      - ./config/mysql/versions/5.7/conf.d/90-version.cnf:/etc/mysql/conf.d/90-version.cnf:ro
      - ./runtime/backups/mysql57:/backups
      - ./runtime/logs/mysql57:/var/log/mysql
      - ./runtime/secrets/mysql/mysql57-root.cnf:/run/secrets/vibeops-root.cnf:ro
    healthcheck: *mysql-healthcheck
    networks:
      - backend

  # Default MySQL service.
  mysql84:
    image: mysql:${MYSQL84_VERSION:-8.4}
    restart: unless-stopped
    logging: *default-logging
    command:
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL84_ROOT_PASSWORD:-${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql84-data:/var/lib/mysql
      - ./config/mysql/common/conf.d/10-common.cnf:/etc/mysql/conf.d/10-common.cnf:ro
      - ./config/mysql/versions/8.4/conf.d/90-version.cnf:/etc/mysql/conf.d/90-version.cnf:ro
      - ./runtime/backups/mysql84:/backups
      - ./runtime/logs/mysql84:/var/log/mysql
      - ./runtime/secrets/mysql/mysql84-root.cnf:/run/secrets/vibeops-root.cnf:ro
    healthcheck: *mysql-healthcheck
    networks:
      - backend

  # Optional preview MySQL. Start explicitly with: docker compose --profile mysql97 up -d mysql97
  mysql97:
    image: mysql:${MYSQL97_VERSION:-9.7}
    profiles: ["mysql97"]
    restart: unless-stopped
    logging: *default-logging
    command:
      - --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL97_ROOT_PASSWORD:-${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql97-data:/var/lib/mysql
      - ./config/mysql/common/conf.d/10-common.cnf:/etc/mysql/conf.d/10-common.cnf:ro
      - ./config/mysql/versions/9.7/conf.d/90-version.cnf:/etc/mysql/conf.d/90-version.cnf:ro
      - ./runtime/backups/mysql97:/backups
      - ./runtime/logs/mysql97:/var/log/mysql
      - ./runtime/secrets/mysql/mysql97-root.cnf:/run/secrets/vibeops-root.cnf:ro
    healthcheck: *mysql-healthcheck
    networks:
      - backend

  redis:
    build:
      context: ./docker/redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - backend

  # Optional toolbox matching your old nodejs_install role.
  node:
    image: node:20-trixie-slim
    profiles: ["node"]
    logging: *default-logging
    working_dir: /home
    command: ["sh", "-lc", "sleep infinity"]
    volumes:
      - ./runtime/home:/home
    networks:
      - backend

networks:
  backend:

volumes:
  mysql57-data:
  mysql84-data:
  mysql97-data:
  redis-data:
