; Disable stock www pool; Bento injects per-app pools under php-fpm.d/bento/
[global]
error_log = /proc/self/fd/2
daemonize = no

; Keep a minimal fallback pool only for health; apps use dedicated pools.
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
pm = ondemand
pm.max_children = 2
