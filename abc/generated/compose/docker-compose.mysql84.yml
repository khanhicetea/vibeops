# bento-managed: true
services:
  mysql84:
    image: "mysql:8.4"
    restart: unless-stopped
    networks:
      - private
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    env_file:
      - .env
    volumes:
      - "bento-mysql84-data:/var/lib/mysql"
      - "./generated/mysql/mysql84:/etc/bento/mysql:ro"
volumes:
  bento-mysql84-data: null
