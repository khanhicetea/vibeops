# GENERATED BY bento. Manage with ./manage.py php versions
x-common-php: &common-php
  build:
    context: ./docker/php
  entrypoint: ["docker-php-entrypoint"]
  environment:
    TZ: ${TZ:-Asia/Ho_Chi_Minh}
    SOCKET_GROUP_NAME: ${SOCKET_GROUP_NAME:-nginxsock}
    SOCKET_GID: ${SOCKET_GID:-101}
  networks: [backend]
  logging:
    driver: local
    options:
      max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
      max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  php85:
    <<: *common-php
    image: bento-php85:${PHP85_VERSION:-8.5}
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP85_VERSION:-8.5}
        TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - ./runtime/home:/home
      - ./runtime/run/php-fpm/php85:/run/php-fpm
      - ./runtime/logs/php/php85:/var/log/php
      - ./config/php/common/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
      - ./runtime/generated/php/versions/8.5/pool.d:/usr/local/etc/php-fpm.d/pools:ro
      - ./runtime/generated/php/versions/8.5/users.d:/usr/local/etc/php/users.d:ro
      - ./runtime/generated/cron/php85:/usr/local/etc/php/cron.d:ro
      - ./runtime/generated/runner/php85/programs:/etc/bento/programs:ro
      - ./config/php/supervisor/supervisord.conf:/etc/bento/supervisord.conf:ro
      - ./docker/php/bin/php-identity-sync:/usr/local/bin/php-identity-sync:ro
      - ./docker/php/bin/php-permissions:/usr/local/bin/php-permissions:ro
      - ./docker/php/bin/php-app-run:/usr/local/bin/php-app-run:ro
      - ./docker/php/bin/php-cron-job:/usr/local/bin/php-cron-job:ro
      - ./docker/php/bin/php-supercronic:/usr/local/bin/php-supercronic:ro
    restart: unless-stopped
    command: ["sh", "-lc", "php-identity-sync && exec php-fpm -F"]
  php85-runner:
    <<: *common-php
    image: bento-php85:${PHP85_VERSION:-8.5}
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP85_VERSION:-8.5}
        TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - ./runtime/home:/home
      - ./runtime/run/php-fpm/php85:/run/php-fpm
      - ./runtime/logs/php/php85:/var/log/php
      - ./config/php/common/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
      - ./runtime/generated/php/versions/8.5/pool.d:/usr/local/etc/php-fpm.d/pools:ro
      - ./runtime/generated/php/versions/8.5/users.d:/usr/local/etc/php/users.d:ro
      - ./runtime/generated/cron/php85:/usr/local/etc/php/cron.d:ro
      - ./runtime/generated/runner/php85/programs:/etc/bento/programs:ro
      - ./config/php/supervisor/supervisord.conf:/etc/bento/supervisord.conf:ro
      - ./docker/php/bin/php-identity-sync:/usr/local/bin/php-identity-sync:ro
      - ./docker/php/bin/php-permissions:/usr/local/bin/php-permissions:ro
      - ./docker/php/bin/php-app-run:/usr/local/bin/php-app-run:ro
      - ./docker/php/bin/php-cron-job:/usr/local/bin/php-cron-job:ro
      - ./docker/php/bin/php-supercronic:/usr/local/bin/php-supercronic:ro
    restart: unless-stopped
    command: ["sh", "-lc", "php-identity-sync && exec supervisord -n -c /etc/bento/supervisord.conf"]
    expose: ["9746"]
  php85-cli:
    <<: *common-php
    image: bento-php85:${PHP85_VERSION:-8.5}
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP85_VERSION:-8.5}
        TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - ./runtime/home:/home
      - ./runtime/run/php-fpm/php85:/run/php-fpm
      - ./runtime/logs/php/php85:/var/log/php
      - ./config/php/common/conf.d/90-custom.ini:/usr/local/etc/php/conf.d/90-custom.ini:ro
      - ./runtime/generated/php/versions/8.5/pool.d:/usr/local/etc/php-fpm.d/pools:ro
      - ./runtime/generated/php/versions/8.5/users.d:/usr/local/etc/php/users.d:ro
      - ./runtime/generated/cron/php85:/usr/local/etc/php/cron.d:ro
      - ./runtime/generated/runner/php85/programs:/etc/bento/programs:ro
      - ./config/php/supervisor/supervisord.conf:/etc/bento/supervisord.conf:ro
      - ./docker/php/bin/php-identity-sync:/usr/local/bin/php-identity-sync:ro
      - ./docker/php/bin/php-permissions:/usr/local/bin/php-permissions:ro
      - ./docker/php/bin/php-app-run:/usr/local/bin/php-app-run:ro
      - ./docker/php/bin/php-cron-job:/usr/local/bin/php-cron-job:ro
      - ./docker/php/bin/php-supercronic:/usr/local/bin/php-supercronic:ro
    profiles: ["cli"]
    entrypoint: ["php-app-run"]
    command: ["bash"]
