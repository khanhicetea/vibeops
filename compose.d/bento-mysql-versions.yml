# GENERATED BY bento. Manage with ./manage.py mysql versions
x-bento-mysql-healthcheck: &bento-mysql-healthcheck
  test: ["CMD", "mysqladmin", "--defaults-extra-file=/run/secrets/bento-root.cnf", "ping", "--silent"]
  interval: 5s
  timeout: 5s
  retries: 20
  start_period: 30s

services:
  mysql84:
    image: mysql:${MYSQL84_VERSION:-8.4}
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
        max-file: "${DOCKER_LOG_MAX_FILE:-5}"
    command: ["--innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-512M}"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL84_ROOT_PASSWORD:-${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    volumes:
      - mysql84-data:/var/lib/mysql
      - ./config/mysql/common/conf.d/10-common.cnf:/etc/mysql/conf.d/10-common.cnf:ro
      - ./config/mysql/versions/8.4/conf.d/90-version.cnf:/etc/mysql/conf.d/90-version.cnf:ro
      - ./runtime/backups/mysql84:/backups
      - ./runtime/logs/mysql84:/var/log/mysql
      - ./runtime/secrets/mysql/mysql84-root.cnf:/run/secrets/bento-root.cnf:ro
    healthcheck: *bento-mysql-healthcheck
    networks: [backend]

volumes:
  mysql84-data:
