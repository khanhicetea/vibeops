# Bento CI / release gates (Phase F4)
# Pin Deno 2.9.x. Explicit permissions only — never require -A for operator path.

name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  DENO_VERSION: "2.9.3"

jobs:
  check:
    name: fmt · lint · check · unit/contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Show Deno version
        run: deno --version

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Lockfile frozen (fail on resolution drift)
        run: deno install --frozen=true

      - name: Unit + contract tests
        run: deno task test

  integration:
    name: integration (docker soft-skip ok)
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Integration suite
        run: deno task test:integration
        # Suite self-skips Docker-dependent assertions when daemon is unavailable.

  compile-smoke:
    name: compile + binary smoke + parity
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Compile native binary
        run: deno task compile

      - name: Binary smoke (F-29)
        run: |
          ./dist/bento version
          STACK=$(mktemp -d)
          ./dist/bento --stack "$STACK" init
          ./dist/bento --stack "$STACK" render
          ./dist/bento --stack "$STACK" status
          rm -rf "$STACK"

      - name: Source/binary parity (F-30)
        run: deno task test:parity

      - name: Cross-compile release targets
        run: |
          deno task compile:amd64
          deno task compile:arm64
          ls -la dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bento-binaries
          path: dist/
          if-no-files-found: error
