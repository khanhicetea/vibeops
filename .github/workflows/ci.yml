name: release-binaries

on:
  push:
    tags:
      - "*"
  release:
    types: [published]

permissions:
  contents: write

env:
  DENO_VERSION: "2.9.3"

jobs:
  build:
    name: Build Linux binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Compile amd64 and arm64 binaries
        run: |
          deno task compile:amd64
          deno task compile:arm64

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: |
            dist/bento-linux-amd64
            dist/bento-linux-arm64
          fail_on_unmatched_files: true
