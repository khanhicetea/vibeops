# Optional WordPress anonymous page cache.
# Include inside the WordPress PHP location after `include /etc/nginx/snippets/php_fastcgi.conf;`.

set $skip_wordpress_cache 0;
if ($request_method !~ ^(GET|HEAD)$) { set $skip_wordpress_cache 1; }
if ($query_string != "") { set $skip_wordpress_cache 1; }
if ($request_uri ~* "^/(wp-admin|wp-login\.php|wp-cron\.php|xmlrpc\.php)") { set $skip_wordpress_cache 1; }
if ($http_cookie ~* "(wordpress_logged_in|comment_author|woocommerce_items_in_cart|wp_woocommerce_session|wp-postpass)") { set $skip_wordpress_cache 1; }

fastcgi_cache fastcgi_cache;
fastcgi_cache_bypass $skip_wordpress_cache;
fastcgi_no_cache $skip_wordpress_cache;
fastcgi_cache_methods GET HEAD;
fastcgi_cache_valid 200 301 302 10m;
fastcgi_cache_valid 404 1m;
fastcgi_cache_lock on;
fastcgi_cache_lock_timeout 5s;
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
add_header X-WordPress-Cache $upstream_cache_status always;
