# Optional anonymous FastCGI cache snippet.
# Include inside a PHP location after `include /etc/nginx/snippets/php_fastcgi.conf;`.
# Designed to be conservative: cache only GET/HEAD, bypass on auth/session-like cookies.

set $skip_fastcgi_cache 0;
if ($request_method !~ ^(GET|HEAD)$) { set $skip_fastcgi_cache 1; }
if ($query_string != "") { set $skip_fastcgi_cache 1; }
if ($http_authorization != "") { set $skip_fastcgi_cache 1; }
if ($http_cookie ~* "(wordpress_logged_in|comment_author|woocommerce_|wp-postpass|PHPSESSID|laravel_session|XSRF-TOKEN)") { set $skip_fastcgi_cache 1; }

fastcgi_cache fastcgi_cache;
fastcgi_cache_bypass $skip_fastcgi_cache;
fastcgi_no_cache $skip_fastcgi_cache;
fastcgi_cache_methods GET HEAD;
fastcgi_cache_valid 200 301 302 10m;
fastcgi_cache_valid 404 1m;
fastcgi_cache_lock on;
fastcgi_cache_lock_timeout 5s;
fastcgi_ignore_headers Cache-Control Expires Set-Cookie;
add_header X-FastCGI-Cache $upstream_cache_status always;
