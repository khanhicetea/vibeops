# Optional anonymous proxy cache snippet.
# Include inside a proxy location after `include /etc/nginx/snippets/proxy_ssl.conf;`.

set $skip_proxy_cache 0;
if ($request_method !~ ^(GET|HEAD)$) { set $skip_proxy_cache 1; }
if ($http_authorization != "") { set $skip_proxy_cache 1; }
if ($http_cookie ~* "(session|logged_in|wordpress_logged_in|woocommerce_|laravel_session|XSRF-TOKEN)") { set $skip_proxy_cache 1; }

proxy_cache proxy_cache;
proxy_cache_bypass $skip_proxy_cache;
proxy_no_cache $skip_proxy_cache;
proxy_cache_methods GET HEAD;
proxy_cache_valid 200 301 302 10m;
proxy_cache_valid 404 1m;
proxy_cache_lock on;
proxy_cache_lock_timeout 5s;
add_header X-Proxy-Cache $upstream_cache_status always;
