# Optional proxy mode for WebSocket/SSE/streaming endpoints.
# Include inside a proxy location instead of or after proxy_ssl.conf as appropriate.

proxy_http_version 1.1;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_buffering off;
proxy_cache off;
proxy_read_timeout 1h;
proxy_send_timeout 1h;
