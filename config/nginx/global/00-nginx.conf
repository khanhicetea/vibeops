resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 10s;

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Official NGINX ACME module. Vhosts can opt in with `acme_certificate letsencrypt`.
# Edit this issuer block if you need staging, EAB, preferred chains, or contact email.
acme_issuer letsencrypt {
    uri https://acme-v02.api.letsencrypt.org/directory;
    challenge http-01;
    state_path /var/cache/nginx/acme-letsencrypt;
    accept_terms_of_service;
}

acme_shared_zone zone=ngx_acme_shared:1m;

server_tokens off;
index index.php index.htm index.html;

limit_req_status 429;
limit_conn_status 429;
limit_req_zone $binary_remote_addr zone=req_per_ip:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

open_file_cache max=100000 inactive=20s;
open_file_cache_valid 30s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

# Shared cache zones for vhosts that opt in later.
# Keys include scheme, method, host, and request URI to avoid cross-host/method collisions.
proxy_cache_path /var/cache/nginx/proxy levels=1:2 keys_zone=proxy_cache:100m max_size=1g inactive=60m use_temp_path=off;
proxy_cache_key "$scheme$request_method$host$request_uri";
fastcgi_cache_path /var/cache/nginx/fastcgi levels=1:2 keys_zone=fastcgi_cache:100m max_size=1g inactive=60m use_temp_path=off;
fastcgi_cache_key "$scheme$request_method$host$request_uri";

sendfile on;
tcp_nopush on;
tcp_nodelay on;

access_log off;
error_log /var/log/nginx/error.log warn;

keepalive_requests 512;
keepalive_timeout 30;
send_timeout 30;
reset_timedout_connection on;

client_header_timeout 5s;
client_body_buffer_size 16k;
client_max_body_size 32m;
client_body_timeout 10m;
client_header_buffer_size 4k;
large_client_header_buffers 4 8k;

types_hash_max_size 2048;

gzip on;
gzip_static on;
gzip_disable "msie6";
gzip_min_length 1000;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 1;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;

ssl_session_timeout 30m;
ssl_session_cache shared:SSL:20m;
ssl_session_tickets off;
ssl_protocols TLSv1.2 TLSv1.3;

# HTTP/3 over QUIC. Vhosts enable UDP/443 with `listen ... quic`.
http3 on;
quic_retry on;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
# Cache variable-based certificates returned by ngx_http_acme_module.
ssl_certificate_cache max=1000 inactive=20s valid=1m;
