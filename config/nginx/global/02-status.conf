# Local-only Nginx health/status endpoint.
# Host-networked container: query from host with `curl http://127.0.0.1:8080/nginx_status`.
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    access_log off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}
