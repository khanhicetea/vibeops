# Local-only Nginx health/status endpoint.
# Host-networked container: query from host with `curl http://127.0.0.1:8080/nginx_status`.
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    access_log off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }

    location = /goaccess {
        return 302 /goaccess/;
    }

    # Static daily reports contain client addresses and request metadata.
    # This server is bound to host loopback only; keep the ACL as defense in depth.
    location /goaccess/ {
        alias /var/log/nginx/goaccess/;
        index index.html;
        add_header Cache-Control "private, no-store" always;
        allow 127.0.0.1;
        deny all;
    }
}
