name: bento

# Docker owns operational stdout/stderr retention. App-owned cron file logs are
# separate and rotated by the scheduler's daily logrotate job.
x-default-logging: &default-logging
  driver: local
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-20m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-5}"

services:
  nginx:
    build:
      context: ./docker/nginx
      args:
        NGINX_BASE_IMAGE: nginx:${NGINX_VERSION:-1.30}-trixie
    image: bento/nginx:${NGINX_VERSION:-1.30}-zstd
    restart: unless-stopped
    # Host network: nginx binds directly to host :80 and :443 TCP/UDP with no Docker port mapping/NAT.
    # Intended for Linux cloud servers. Docker Desktop host networking behaves differently.
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}
      NGINX_ACCESS_LOG_MAX_SIZE: ${NGINX_ACCESS_LOG_MAX_SIZE:-100M}
      NGINX_ACCESS_LOG_ROTATE: ${NGINX_ACCESS_LOG_ROTATE:-14}
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/global:/etc/nginx/global:ro
      - ./runtime/generated/nginx/vhosts:/etc/nginx/vhosts:ro
      - ./config/nginx/snippets:/etc/nginx/snippets:ro
      - ./config/nginx/self-signed:/etc/nginx/self-signed:ro
      - ./runtime/home:/home:ro
      - ./runtime/run/php-fpm:/run/php-fpm
      - ./runtime/nginx-acme-state:/var/cache/nginx/acme-letsencrypt
      - ./runtime/acme-challenge:/usr/share/nginx/acme-challenge:ro
      - ./runtime/certs:/etc/letsencrypt:ro
      - ./runtime/logs/nginx:/var/log/nginx
    logging: *default-logging

  # MySQL services and their durable named volumes are generated in
  # compose.d/bento-mysql-versions.yml by `./manage.py mysql add <version>`.

  redis:
    build:
      context: ./docker/redis
    restart: unless-stopped
    logging: *default-logging
    environment:
      REDIS_APP_ACL: ${REDIS_APP_ACL:-false}
      REDIS_ADMIN_PASSWORD: ${REDIS_ADMIN_PASSWORD:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_LEGACY_PASSWORD: ${REDIS_LEGACY_PASSWORD:-}
      REDIS_MAXMEMORY: ${REDIS_MAXMEMORY:-256mb}
      REDIS_MAXMEMORY_POLICY: ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$REDIS_APP_ACL\" = true ]; then REDISCLI_AUTH=\"$$REDIS_ADMIN_PASSWORD\" redis-cli --user admin ping; elif [ -n \"$$REDIS_PASSWORD\" ]; then REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping; else redis-cli ping; fi | grep -qx PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - backend

networks:
  backend:

volumes:
  redis-data:
